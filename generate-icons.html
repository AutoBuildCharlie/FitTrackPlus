<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<br>
<a id="dl192" download="icon-192.png">Download 192x192</a> &nbsp;
<a id="dl512" download="icon-512.png">Download 512x512</a>
<script>
function drawIcon(canvas) {
    const s = canvas.width;
    const ctx = canvas.getContext('2d');
    // Background
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath();
    ctx.roundRect(0, 0, s, s, s * 0.18);
    ctx.fill();
    // Orange glow circle
    const grad = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
    grad.addColorStop(0, 'rgba(255,107,0,0.15)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, s, s);
    // Text "FT"
    ctx.fillStyle = '#FF6B00';
    ctx.font = `bold ${s * 0.42}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(255,107,0,0.8)';
    ctx.shadowBlur = s * 0.08;
    ctx.fillText('FT', s / 2, s / 2);
    // "AI" smaller below
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${s * 0.16}px Arial`;
    ctx.shadowBlur = 0;
    ctx.fillText('AI', s / 2, s * 0.72);
}

['c192','c512'].forEach(id => {
    const c = document.getElementById(id);
    drawIcon(c);
});

document.getElementById('dl192').href = document.getElementById('c192').toDataURL('image/png');
document.getElementById('dl512').href = document.getElementById('c512').toDataURL('image/png');
</script>
</body>
</html>
